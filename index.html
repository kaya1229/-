<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철삼림: CCTV 모니터링 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a0f;
            --monitor-border: #2c2c2c;
            --accent-blue: #00e5ff;
            --system-blue: #00aaff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
            --font-main: 'Nanum Gothic Coding', monospace;
            --font-title: 'Orbitron', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: var(--font-main);
            overflow: hidden; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
        }

        /* 스캔라인 효과 */
        body::after {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 10000; pointer-events: none; opacity: 0.1;
        }

        /* 로그인 화면 (CCTV 콘솔 느낌) */
        #login-screen {
            width: 550px; height: 480px; background: #000;
            border: 10px solid var(--monitor-border); padding: 30px;
            display: flex; flex-direction: column; z-index: 110;
            box-shadow: inset 0 0 50px rgba(0, 170, 255, 0.1);
            position: relative;
        }

        #terminal-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        #terminal-header h1 { font-family: var(--font-title); font-size: 2.5rem; letter-spacing: 10px; color: var(--accent-blue); margin: 0; }
        #terminal-header p { font-size: 0.8rem; color: var(--system-blue); margin: 5px 0; letter-spacing: 2px; }

        #login-log { flex-grow: 1; font-size: 0.85rem; color: var(--system-blue); overflow-y: auto; line-height: 1.6; }
        #login-input-area { display: none; border-top: 1px solid #333; padding-top: 15px; margin-top: 10px; }
        #pass-input { background: transparent; border: none; color: #fff; outline: none; font-family: var(--font-main); font-size: 1rem; width: 200px; }

        #terminal-footer { text-align: center; font-size: 0.65rem; color: #444; margin-top: 15px; font-family: var(--font-title); }

        /* CCTV 멀티 채널 게임 컨테이너 */
        #game-container {
            display: none; width: 95vw; height: 90vh; max-width: 1000px;
            background: #000; border: 15px solid var(--monitor-border);
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 10px; padding: 15px; box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        .cctv-cell { background: #080d12; border: 1px solid #1a1a1a; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .cctv-label { position: absolute; top: 5px; left: 8px; font-size: 0.7rem; color: #555; font-family: var(--font-title); z-index: 10; }
        .cctv-label.active { color: var(--signal-green); font-weight: bold; }

        /* 메인 게임 채널 (중앙 상단) */
        #main-game-channel { grid-column: 1 / 3; grid-row: 1 / 3; display: flex; flex-direction: column; padding: 10px; }
        
        #grid { flex-grow: 1; display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: #000; padding: 5px; align-self: center; width: 100%; max-width: 400px; }
        .tile { aspect-ratio: 1; background: #16222c; border: 1px solid #253341; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.1rem; font-family: var(--font-title); transition: 0.1s; }
        .tile.open { background: #050a0f; }

        /* 시스템 로그 및 상태 채널 */
        #side-panel { grid-column: 3; grid-row: 1 / 3; display: flex; flex-direction: column; gap: 10px; }
        .status-box { height: 40%; background: #000; border: 1px solid #222; padding: 10px; font-size: 0.75rem; color: var(--system-blue); }
        .log-box { height: 60%; background: #000; border: 1px solid #222; padding: 10px; font-size: 0.75rem; color: var(--signal-green); overflow-y: auto; }

        /* 특수 효과 */
        .dimmed { opacity: 0.2; }
        .target-highlight { background: var(--danger-red) !important; box-shadow: 0 0 20px var(--danger-red); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        #result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div id="terminal-header">
        <h1>강철삼림</h1>
        <p>OPERATION: STEEL FOREST - CCTV ACCESS</p>
    </div>
    <div id="login-log"></div>
    <div id="login-input-area">
        <span class="prompt" style="color:var(--accent-blue)">ROOT@SYS:~$</span> <input type="text" id="pass-input" autocomplete="off">
    </div>
    <div id="terminal-footer">made by deokjilkkk</div>
</div>

<div id="game-container">
    <div id="main-game-channel" class="cctv-cell">
        <div class="cctv-label active">CH 05 - TARGET AREA (LIVE)</div>
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px; padding: 0 10px;">
            <div id="agent-display" style="font-size:0.7rem; color:var(--system-blue)">AGENT: ---</div>
            <div id="global-timer" style="font-family:var(--font-title); color:var(--signal-green); font-size: 1.2rem;">00:00</div>
            <div id="objective-display" style="font-size:0.7rem; color:var(--danger-red)">GOAL: J.C</div>
        </div>
        <div id="grid"></div>
    </div>

    <div id="side-panel">
        <div class="status-box cctv-cell">
            <div class="cctv-label">CH 08 - DATA STREAM</div>
            <div id="data-stats" style="margin-top:20px; line-height: 2;">
                Kb/S: 1044 <br> SIGNAL: STABLE <br> TRACE: 0.04% <br> THREAT: LOW
            </div>
        </div>
        <div class="log-box cctv-cell">
            <div class="cctv-label">CH 09 - SYSTEM LOG</div>
            <div id="log-display" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<div id="result-screen">
    <h1 id="result-title" style="font-family:var(--font-title); font-size: 3rem; letter-spacing: 15px;">STATUS</h1>
    <p id="result-msg" style="color:#ccc; margin: 20px 0;"></p>
    <button onclick="location.reload()" style="background:transparent; border:1px solid #fff; color:#fff; padding:10px 40px; cursor:pointer; font-family:var(--font-title);">RE-ATTEMPT</button>
</div>

<script>
    const ROWS = 10, COLS = 8, MINES = 12;
    let grid = [], opened = [], targetPos = { r: 0, c: 0 };
    let gameActive = false, totalSeconds = 0, hintDuration = 3000, mainTimer, currentMode = "";

    const loginLog = document.getElementById('login-log');
    const inputArea = document.getElementById('login-input-area');
    const passInput = document.getElementById('pass-input');
    const logEl = document.getElementById('log-display');

    const introMessages = [
        "▶ CCTV 채널 강제 접속 시도...",
        "▶ 보안 프로토콜 우회 완료.",
        "▶ CH 05: 타겟 밀집 구역 신호 확보.",
        "▶ 암호를 입력하십시오. (저우진/장한성/치옌)"
    ];

    function startIntro() {
        let i = 0;
        const interval = setInterval(() => {
            if (i < introMessages.length) {
                const p = document.createElement('div');
                p.innerText = introMessages[i];
                loginLog.appendChild(p);
                loginLog.scrollTop = loginLog.scrollHeight;
                i++;
            } else {
                clearInterval(interval);
                inputArea.style.display = 'block';
                passInput.focus();
            }
        }, 600);
    }
    window.onload = startIntro;

    passInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = passInput.value.toUpperCase();
            if (val === '저우진') proceedLogin("저우진", 180, 5000, "EASY");
            else if (val === '장한성') proceedLogin("장한성", 120, 3000, "NORMAL");
            else if (val === '치옌') proceedLogin("치옌", 120, 1500, "BOSS");
            else { passInput.value = ""; }
        }
    });

    function proceedLogin(name, time, hTime, mode) {
        gameActive = true; totalSeconds = time; hintDuration = hTime; currentMode = mode;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'grid';
        document.getElementById('agent-display').innerText = `AGENT: ${name}`;
        
        // BOSS 모드 붉은 경고 효과
        if (mode === "BOSS") {
            document.getElementById('game-container').style.borderColor = "var(--danger-red)";
            document.querySelectorAll('.cctv-label').forEach(l => l.style.color = "var(--danger-red)");
        }

        setupBoard();
        startTimer();
        addLogEntry("작전 구역 모니터링 시작.");
    }

    function setupBoard() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        opened = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        let tSet = false, mSet = 0;
        while (!tSet || mSet < MINES - 1) {
            let r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
            if (grid[r][c] === 0) {
                if (!tSet) { targetPos = {r, c}; grid[r][c] = 'T'; tSet = true; }
                else { grid[r][c] = 'M'; mSet++; }
            }
        }
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (grid[r][c] === 'M' || grid[r][c] === 'T') continue;
                let count = 0;
                for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) {
                    let nr = r+i, nc = c+j;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && (grid[nr][nc]==='M'||grid[nr][nc]==='T')) count++;
                }
                grid[r][c] = count;
            }
        }
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${r}-${c}`;
            div.onclick = () => handleClick(r, c);
            gridEl.appendChild(div);
        }
    }

    function addLogEntry(msg) {
        const entry = document.createElement('div');
        entry.innerText = `▶ ${msg}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function handleClick(r, c) {
        if (!gameActive || opened[r][c]) return;
        if (currentMode === "BOSS") {
            if (grid[r][c] === 'T') showResult(false, "EXPOSED", "잠입 중 정체가 발각되었습니다.");
            else if (grid[r][c] === 'M') { reveal(r, c, "✅"); addLogEntry("조직원 무력화."); checkWin(); }
            else { reveal(r, c); addLogEntry("구역 스캔 중..."); checkWin(); }
        } else {
            if (grid[r][c] === 'T') { reveal(r, c, "⚠️"); addLogEntry("타겟 확인!"); checkWin(); }
            else if (grid[r][c] === 'M') {
                gameActive = false;
                document.querySelectorAll('.tile').forEach(t => { 
                    const [_, tr, tc] = t.id.split('-').map(Number);
                    if(grid[tr][tc] === 'M') { t.style.background = "var(--danger-red)"; t.innerText = "💣"; }
                });
                setTimeout(() => showResult(false, "ELIMINATED", "폭탄 트랩이 작동했습니다."), 500);
            }
            else { reveal(r, c); addLogEntry("안전 구역 확보."); checkWin(); }
        }
    }

    function reveal(r, c, icon = null) {
        if (r<0 || r>=ROWS || c<0 || c>=COLS || opened[r][c]) return;
        opened[r][c] = true;
        const el = document.getElementById(`t-${r}-${c}`);
        el.classList.add('open');
        if (icon) {
            el.innerText = icon;
            el.style.color = icon === "✅" ? "var(--system-blue)" : "var(--danger-red)";
        } else if (grid[r][c] > 0) {
            el.innerText = grid[r][c];
            el.style.color = "var(--accent-blue)";
            setTimeout(() => { if(el.classList.contains('open')) el.style.color = "#333"; }, hintDuration);
        }
        if (grid[r][c] === 0) for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) reveal(r+i, c+j);
    }

    function checkWin() {
        let safeLeft = 0, minesCleared = true, foundT = opened[targetPos.r][targetPos.c];
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            if (typeof grid[r][c] === 'number' && !opened[r][c]) safeLeft++;
            if (grid[r][c] === 'M' && !opened[r][c]) minesCleared = false;
        }

        if (currentMode === "BOSS") {
            if (safeLeft === 0 && minesCleared) {
                gameActive = false; clearInterval(mainTimer);
                document.querySelectorAll('.tile').forEach(t => t.classList.add('dimmed'));
                const targetTile = document.getElementById(`t-${targetPos.r}-${targetPos.c}`);
                targetTile.classList.remove('dimmed'); targetTile.classList.add('target-highlight');
                targetTile.innerText = "🎯";
                setTimeout(() => showResult(true, "CLEAN SWEEP", "배신자 장청을 제거했습니다."), 2000);
            }
        } else {
            if (foundT && safeLeft === 0) showResult(true, "MISSION COMPLETE", "장청 확보 성공.");
        }
    }

    function startTimer() {
        mainTimer = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
            document.getElementById('global-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (totalSeconds <= 0) showResult(false, "SIGNAL LOST", "데이터 추적 시간 초과.");
        }, 1000);
    }

    function showResult(isSuccess, title, msg) {
        clearInterval(mainTimer);
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-title').style.color = isSuccess ? "var(--signal-green)" : "var(--danger-red)";
        document.getElementById('result-msg').innerText = msg;
    }
</script>
</body>
</html>
