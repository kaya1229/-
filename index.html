<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철삼림: 언더커버 추출 작전</title>
    <style>
        :root {
            --bg-dark: #050a0f;
            --panel-bg: #0d151d;
            --accent-blue: #00e5ff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
            --border-color: #2a3b4d;
            --text-main: #e0e0e0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); font-family: 'Courier New', monospace;
            overflow: hidden; color: var(--text-main);
        }

        /* [UI] 기본 CCTV 스캔라인 */
        body::after {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none; z-index: 200; opacity: 0.4;
        }

        /* [스캔 레이어] */
        #scan-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100;
            --mask-x: -100%; --mask-y: -100%;
            mask-image: radial-gradient(circle 120px at var(--mask-x) var(--mask-y), black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle 120px at var(--mask-x) var(--mask-y), black 20%, transparent 100%);
        }
        .hidden-hint { position: absolute; color: #111; font-size: 0.8rem; letter-spacing: 2px; z-index: 50; transition: color 0.4s; }
        .scanned { color: var(--accent-blue) !important; text-shadow: 0 0 8px var(--accent-blue); }

        /* [게임 본체 UI 복구] */
        #game-container { 
            display: none; width: 380px; background: var(--panel-bg); 
            border: 1px solid var(--border-color); padding: 25px; 
            position: relative; z-index: 5; margin: auto; margin-top: 8vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .timer-val { font-size: 1.6rem; color: var(--signal-green); font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .tile { aspect-ratio: 1; background: #16222c; border: 1px solid #253341; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .tile.open { background: var(--bg-dark); cursor: default; }

        /* [결과 오버레이 - 강화형] */
        #result-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 300; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: #000;
        }

        /* 실패 시 붉은 경고등 깜빡임 연출 */
        .fail-bg {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: inset 0 0 100px rgba(0,0,0,1); }
            50% { box-shadow: inset 0 0 200px rgba(255, 0, 0, 0.4); }
        }

        /* 지지직거리는 노이즈 효과 */
        .noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/b/b1/Static_noise.gif');
            opacity: 0.05; pointer-events: none; mix-blend-mode: screen;
        }

        #result-title { font-size: 2.2rem; letter-spacing: 8px; margin-bottom: 15px; font-weight: 900; }
        #result-msg { font-size: 1rem; color: #aaa; margin-bottom: 40px; max-width: 80%; line-height: 1.6; }
        
        /* 글자색 설정 */
        .text-white { color: #ffffff !important; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .text-green { color: var(--signal-green) !important; text-shadow: 0 0 10px var(--signal-green); }

        .retry-btn {
            background: transparent; border: 1px solid #ffffff; color: #ffffff;
            padding: 15px 40px; cursor: pointer; font-family: inherit; letter-spacing: 2px;
            z-index: 310; transition: 0.3s;
        }
        .retry-btn:hover { background: #ffffff; color: #000; }

        .timer-red { color: var(--danger-red) !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="scan-overlay"></div>
<div id="hint-container">
    <div class="hidden-hint" style="top:25%; left:15%">ZHOU12 (EASY)</div>
    <div class="hidden-hint" style="top:70%; left:70%">BRAIN9 (NORMAL)</div>
    <div class="hidden-hint" style="top:10%; left:75%">BOSS00 (HARD)</div>
</div>

<div id="login-screen" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 110; width: 300px;">
    <h2 style="color:var(--accent-blue); letter-spacing: 3px;">SYSTEM LOGIN</h2>
    <input type="text" id="pass-input" placeholder="ENTER CODE" style="background:#000; border:1px solid var(--accent-blue); color:var(--accent-blue); padding:15px; text-align:center; width:100%; outline:none;" autocomplete="off">
</div>

<div id="game-container">
    <header>
        <div><span style="font-size:0.6rem; color:#556a7d">AGENT</span><br><span id="agent-name" style="color:var(--accent-blue)">---</span></div>
        <div style="text-align:center"><span style="font-size:0.6rem; color:#556a7d">TRACE</span><div id="global-timer" class="timer-val">00:00</div></div>
        <div style="text-align:right"><span style="font-size:0.6rem; color:#556a7d">OBJ</span><br><span id="target-goal" style="color:var(--danger-red)">JANG CHENG</span></div>
    </header>
    <div id="grid"></div>
</div>

<div id="result-screen">
    <div class="noise"></div>
    <h1 id="result-title">MISSION STATUS</h1>
    <p id="result-msg"></p>
    <button class="retry-btn" onclick="location.reload()">RE-INITIALIZE</button>
</div>

<script>
    const ROWS = 10, COLS = 8, MINES = 12;
    let grid = [], opened = [], flagged = [], targetPos = { r: 0, c: 0 };
    let gameActive = false, totalSeconds = 0, hintDuration = 4000, mainTimer, currentMode = "";

    const overlay = document.getElementById('scan-overlay');
    const loginScreen = document.getElementById('login-screen');
    const gameContainer = document.getElementById('game-container');
    const passInput = document.getElementById('pass-input');
    const resultScreen = document.getElementById('result-screen');

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);

    function handleMove(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (!x || !y) return;
        overlay.style.setProperty('--mask-x', `${x}px`);
        overlay.style.setProperty('--mask-y', `${y}px`);
        document.querySelectorAll('.hidden-hint').forEach(hint => {
            const rect = hint.getBoundingClientRect();
            if (Math.sqrt(Math.pow(x-(rect.left+rect.width/2),2) + Math.pow(y-(rect.top+rect.height/2),2)) < 100) hint.classList.add('scanned');
            else hint.classList.remove('scanned');
        });
    }

    passInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = passInput.value.toUpperCase();
            if (val === 'ZHOU12') initGame("ZHOU JIN", 180, 8000, "EASY");
            else if (val === 'BRAIN9') initGame("ZHANG HAN-SUNG", 120, 4000, "NORMAL");
            else if (val === 'BOSS00') initGame("THE BOSS", 120, 1500, "BOSS");
            else { passInput.value = ""; }
        }
    });

    function initGame(name, time, hTime, mode) {
        gameActive = true; totalSeconds = time; hintDuration = hTime; currentMode = mode;
        loginScreen.style.display = 'none'; overlay.style.display = 'none';
        document.getElementById('hint-container').style.display = 'none';
        gameContainer.style.display = 'block';
        document.getElementById('agent-name').innerText = name;
        if(mode === "BOSS") document.getElementById('target-goal').innerText = "CLEAN SWEEP";
        setupBoard();
        startTimer();
    }

    function setupBoard() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        opened = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        flagged = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        let tSet = false, mSet = 0;
        while (!tSet || mSet < MINES - 1) {
            let r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
            if (grid[r][c] === 0) {
                if (!tSet) { targetPos = {r, c}; grid[r][c] = 'T'; tSet = true; }
                else { grid[r][c] = 'M'; mSet++; }
            }
        }
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (grid[r][c] === 'M' || grid[r][c] === 'T') continue;
                let count = 0;
                for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) {
                    let nr = r+i, nc = c+j;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && (grid[nr][nc]==='M'||grid[nr][nc]==='T')) count++;
                }
                grid[r][c] = count;
            }
        }
        renderBoard();
    }

    function renderBoard() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${r}-${c}`;
            div.onclick = () => handleClick(r, c);
            div.oncontextmenu = (e) => { e.preventDefault(); handleRightClick(r, c); };
            gridEl.appendChild(div);
        }
    }

    function handleClick(r, c) {
        if (!gameActive || opened[r][c] || flagged[r][c]) return;
        if (currentMode === "BOSS") {
            if (grid[r][c] === 'M' || grid[r][c] === 'T') showResult(false, "CONNECTION TERMINATED", "시스템 해킹 감지. 에이전트 위치가 노출되었습니다.");
            else { reveal(r, c); checkWin(); }
        } else {
            if (grid[r][c] === 'T') showResult(true, "EXTRACTION SUCCESS", "타겟 확보 완료. 안전 구역으로 철수하십시오.");
            else if (grid[r][c] === 'M') showResult(false, "SIGNAL COMPROMISED", "함정에 빠졌습니다. 현장에서 즉시 이탈하십시오.");
            else reveal(r, c);
        }
    }

    function handleRightClick(r, c) {
        if (!gameActive || opened[r][c]) return;
        flagged[r][c] = !flagged[r][c];
        document.getElementById(`t-${r}-${c}`).innerText = flagged[r][c] ? "🚩" : "";
        if (currentMode === "BOSS") checkWin();
    }

    function reveal(r, c) {
        if (r<0 || r>=ROWS || c<0 || c>=COLS || opened[r][c] || flagged[r][c]) return;
        opened[r][c] = true;
        const el = document.getElementById(`t-${r}-${c}`);
        el.classList.add('open');
        if (grid[r][c] > 0) el.innerText = grid[r][c];
        const dist = Math.sqrt(Math.pow(r-targetPos.r, 2) + Math.pow(c-targetPos.c, 2));
        let cls = dist <= 2.2 ? 'hint-red' : (dist <= 4.2 ? 'hint-orange' : 'hint-blue');
        el.classList.add(cls);
        setTimeout(() => { el.classList.remove('hint-red', 'hint-orange', 'hint-blue'); }, hintDuration);
        if (grid[r][c] === 0) {
            for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) reveal(r+i, c+j);
        }
    }

    function checkWin() {
        if (currentMode !== "BOSS") return;
        let win = true;
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if ((grid[r][c] === 'M' || grid[r][c] === 'T') && !flagged[r][c]) win = false;
                if (typeof grid[r][c] === 'number' && !opened[r][c]) win = false;
            }
        }
        if (win) showResult(true, "MISSION COMPLETE", "언더커버 장청과 접선했습니다.");
    }

    function startTimer() {
        mainTimer = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
            const display = document.getElementById('global-timer');
            display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (totalSeconds <= 15) display.classList.add('timer-red');
            if (totalSeconds <= 0) showResult(false, "TIME OVER", "통신 두절. 작전이 강제 종료되었습니다.");
        }, 1000);
    }

    function showResult(isSuccess, title, msg) {
        gameActive = false;
        clearInterval(mainTimer);
        resultScreen.style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-msg').innerText = msg;

        if (isSuccess) {
            resultScreen.classList.remove('fail-bg');
            document.getElementById('result-title').className = 'text-green';
        } else {
            resultScreen.classList.add('fail-bg');
            document.getElementById('result-title').className = 'text-white';
        }
    }
</script>
</body>
</html>
